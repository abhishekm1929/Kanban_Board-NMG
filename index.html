<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forge2 Kanban Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #f0f6fc; }
    header .badge {
      background: #1f6feb;
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    header .member-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #8b949e;
    }
    header .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #1f6feb;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
    }

    .board-wrapper {
      padding: 24px;
      overflow-x: auto;
    }

    .board {
      display: flex;
      gap: 16px;
      min-width: max-content;
      align-items: flex-start;
    }

    .column {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .col-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
    }
    .col-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .col-title { font-size: 0.85rem; font-weight: 600; flex: 1; }
    .col-count {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      font-size: 0.72rem;
      padding: 1px 7px;
      color: #8b949e;
    }

    .cards {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    .card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .card:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 0 1px #58a6ff22;
    }
    .card.overdue { border-left: 3px solid #f85149; }

    .card-title { font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
    }
    .tag-bug      { background: #490202; color: #f85149; border: 1px solid #f8514933; }
    .tag-design   { background: #0c2d6b; color: #58a6ff; border: 1px solid #58a6ff33; }
    .tag-feature  { background: #0a3622; color: #3fb950; border: 1px solid #3fb95033; }
    .tag-docs     { background: #2d1c00; color: #e3b341; border: 1px solid #e3b34133; }
    .tag-urgent   { background: #3d1a00; color: #f0883e; border: 1px solid #f0883e33; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .due-date {
      font-size: 0.7rem;
      color: #8b949e;
      display: flex; align-items: center; gap: 4px;
    }
    .due-date.overdue-text { color: #f85149; }
    .assignee-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7rem; color: #8b949e;
    }
    .mini-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 0.6rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }

    .add-card-btn {
      margin: 0 10px 10px;
      padding: 7px;
      background: none;
      border: 1px dashed #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.8rem;
      cursor: pointer;
      width: calc(100% - 20px);
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-card-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #00000088;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      width: 520px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .modal label { font-size: 0.78rem; color: #8b949e; display: block; margin-bottom: 4px; margin-top: 14px; }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 8px 10px;
      font-size: 0.85rem;
      outline: none;
      font-family: inherit;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus {
      border-color: #58a6ff;
    }
    .modal textarea { resize: vertical; min-height: 72px; }

    .tag-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag-check { display: none; }
    .tag-label {
      cursor: pointer;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
      color: #8b949e;
      transition: 0.15s;
      user-select: none;
    }
    .tag-check:checked + .tag-label { border-color: #58a6ff; color: #58a6ff; background: #0c2d6b; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: flex-end;
    }
    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #1f6feb; color: #fff; }
    .btn-primary:hover { background: #388bfd; }
    .btn-danger { background: #490202; color: #f85149; border: 1px solid #f8514933; }
    .btn-danger:hover { background: #6e1c1c; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }

    .close-btn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: #8b949e;
      font-size: 1.2rem; cursor: pointer;
    }
    .close-btn:hover { color: #e6edf3; }

    /* Move-to select in modal */
    .move-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .move-row select { flex: 1; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1f6feb;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.82rem;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="badge">Forge 2</div>
  <h1>Kanban Board</h1>
  <div class="member-pill">
    <div class="avatar">A</div> <span>Agent-built</span>
    <div class="avatar" style="background:#3fb950">H</div> <span>Hermes</span>
    <div class="avatar" style="background:#e3b341">O</div> <span>OpenClaw</span>
  </div>
</header>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<!-- Card Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Card</h2>

    <label>Title</label>
    <input id="cardTitle" type="text" placeholder="Card title…" />

    <label>Description</label>
    <textarea id="cardDesc" placeholder="What needs to happen?"></textarea>

    <label>Tags</label>
    <div class="tag-checkboxes">
      <input class="tag-check" type="checkbox" id="t-bug"     value="bug">     <label class="tag-label" for="t-bug">🐛 bug</label>
      <input class="tag-check" type="checkbox" id="t-design"  value="design">  <label class="tag-label" for="t-design">🎨 design</label>
      <input class="tag-check" type="checkbox" id="t-feature" value="feature"> <label class="tag-label" for="t-feature">✨ feature</label>
      <input class="tag-check" type="checkbox" id="t-docs"    value="docs">    <label class="tag-label" for="t-docs">📄 docs</label>
      <input class="tag-check" type="checkbox" id="t-urgent"  value="urgent">  <label class="tag-label" for="t-urgent">🔥 urgent</label>
    </div>

    <label>Assign Member</label>
    <select id="cardMember">
      <option value="">— unassigned —</option>
      <option value="Alice">Alice</option>
      <option value="Bob">Bob</option>
      <option value="Carol">Carol</option>
      <option value="Dave">Dave</option>
      <option value="Eve">Eve</option>
    </select>

    <label>Due Date</label>
    <input id="cardDue" type="date" />

    <label>Move to List</label>
    <div class="move-row">
      <select id="cardList"></select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteCard()">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const COLS = [
  { id: 'todo',       label: 'To Do',       dot: '#8b949e' },
  { id: 'doing',      label: 'In Progress',  dot: '#1f6feb' },
  { id: 'review',     label: 'Review',       dot: '#e3b341' },
  { id: 'done',       label: 'Done',         dot: '#3fb950' },
];

const MEMBERS = {
  Alice: '#1f6feb', Bob: '#e3b341', Carol: '#3fb950', Dave: '#f0883e', Eve: '#bc8cff'
};

let state = JSON.parse(localStorage.getItem('kanban') || 'null') || {
  cards: [
    { id: uid(), col: 'todo',   title: 'Set up OpenClaw agent',         desc: 'Install via npm, run onboard wizard, connect to Slack socket mode.',  tags: ['feature','urgent'], member: 'Alice', due: future(-1)  },
    { id: uid(), col: 'todo',   title: 'Write Hermes SKILL.md',         desc: 'status-report skill that posts What I Did / Left / Needs Your Call.', tags: ['docs'],            member: 'Bob',   due: future(2)   },
    { id: uid(), col: 'doing',  title: 'Wire Slack channels',           desc: 'Create #sprint-main, #agent-coder, #agent-log and verify round-trip.', tags: ['feature'],         member: 'Alice', due: future(0)   },
    { id: uid(), col: 'doing',  title: 'Laravel API scaffold',          desc: 'composer create-project, migrations for Board/List/Card/Tag/Member.',   tags: ['feature','bug'],   member: 'Carol', due: future(-2)  },
    { id: uid(), col: 'review', title: 'React Kanban UI',               desc: 'Vite + React, drag cards between lists, call Laravel REST API.',       tags: ['design','feature'],member: 'Dave',  due: future(1)   },
    { id: uid(), col: 'done',   title: 'Groq API key obtained',         desc: 'Free key from console.groq.com. Model: openai/gpt-oss-120b.',          tags: ['docs'],            member: 'Eve',   due: future(-3)  },
  ]
};

function uid() { return Math.random().toString(36).slice(2,10); }
function future(days) {
  const d = new Date(); d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function save() { localStorage.setItem('kanban', JSON.stringify(state)); }
function isOverdue(due) { return due && due < new Date().toISOString().slice(0,10); }

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLS.forEach(col => {
    const cards = state.cards.filter(c => c.col === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${col.dot}"></div>
        <div class="col-title">${col.label}</div>
        <div class="col-count">${cards.length}</div>
      </div>
      <div class="cards" id="col-${col.id}"></div>
      <button class="add-card-btn" onclick="openNew('${col.id}')">＋ Add card</button>
    `;
    board.appendChild(colEl);
    const cardsEl = colEl.querySelector(`#col-${col.id}`);
    cards.forEach(card => cardsEl.appendChild(cardEl(card)));
  });
}

function cardEl(card) {
  const div = document.createElement('div');
  const od = isOverdue(card.due);
  div.className = 'card' + (od ? ' overdue' : '');
  div.onclick = () => openEdit(card.id);

  const tagsHtml = (card.tags || []).map(t =>
    `<span class="tag tag-${t}">${t}</span>`).join('');

  const memberHtml = card.member ? `
    <div class="assignee-chip">
      <div class="mini-avatar" style="background:${MEMBERS[card.member]||'#8b949e'}">
        ${card.member[0]}
      </div>${card.member}
    </div>` : '';

  const dueHtml = card.due ? `
    <div class="due-date ${od?'overdue-text':''}">
      ${od?'⚠':'📅'} ${card.due}
    </div>` : '';

  div.innerHTML = `
    <div class="card-title">${card.title}</div>
    ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    <div class="card-meta">${dueHtml}${memberHtml}</div>
  `;
  return div;
}

// ── Modal ──────────────────────────────────────────────────────────────────
let editingId = null;

function openNew(colId) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Card';
  document.getElementById('cardTitle').value = '';
  document.getElementById('cardDesc').value = '';
  document.getElementById('cardMember').value = '';
  document.getElementById('cardDue').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.querySelectorAll('.tag-check').forEach(c => c.checked = false);
  populateListSelect(colId);
  document.getElementById('cardModal').classList.add('open');
  document.getElementById('cardTitle').focus();
}

function openEdit(id) {
  editingId = id;
  const card = state.cards.find(c => c.id === id);
  document.getElementById('modalTitle').textContent = 'Edit Card';
  document.getElementById('cardTitle').value = card.title;
  document.getElementById('cardDesc').value = card.desc || '';
  document.getElementById('cardMember').value = card.member || '';
  document.getElementById('cardDue').value = card.due || '';
  document.getElementById('deleteBtn').style.display = '';
  document.querySelectorAll('.tag-check').forEach(c => {
    c.checked = (card.tags || []).includes(c.value);
  });
  populateListSelect(card.col);
  document.getElementById('cardModal').classList.add('open');
}

function populateListSelect(currentCol) {
  const sel = document.getElementById('cardList');
  sel.innerHTML = COLS.map(c =>
    `<option value="${c.id}" ${c.id===currentCol?'selected':''}>${c.label}</option>`
  ).join('');
}

function closeModal() {
  document.getElementById('cardModal').classList.remove('open');
}

function saveCard() {
  const title = document.getElementById('cardTitle').value.trim();
  if (!title) { document.getElementById('cardTitle').focus(); return; }
  const tags = [...document.querySelectorAll('.tag-check:checked')].map(c => c.value);
  const payload = {
    title,
    desc:   document.getElementById('cardDesc').value.trim(),
    tags,
    member: document.getElementById('cardMember').value,
    due:    document.getElementById('cardDue').value,
    col:    document.getElementById('cardList').value,
  };
  if (editingId) {
    const idx = state.cards.findIndex(c => c.id === editingId);
    state.cards[idx] = { ...state.cards[idx], ...payload };
    toast('Card updated ✓');
  } else {
    state.cards.push({ id: uid(), ...payload });
    toast('Card added ✓');
  }
  save(); closeModal(); render();
}

function deleteCard() {
  if (!editingId) return;
  state.cards = state.cards.filter(c => c.id !== editingId);
  save(); closeModal(); render(); toast('Card deleted');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('cardModal').addEventListener('click', e => {
  if (e.target === document.getElementById('cardModal')) closeModal();
});
render();
</script>
</body>
</html>
